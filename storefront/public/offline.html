<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Srivani Stores</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF3E4;
      color: #2C1B10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 400px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    p  { font-size: 14px; color: #6A5340; line-height: 1.6; margin-bottom: 24px; }
    a  {
      display: inline-block;
      padding: 12px 28px;
      background: #D98324;
      color: #fff;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="font-size:40px;margin-bottom:16px">📦</div>
    <h1>You're offline</h1>
    <p>It looks like there's no internet connection right now. Check your connection and try again.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
