# Srivani ERP — Nginx reverse proxy config
# Copy to: /etc/nginx/sites-enabled/erp.conf
# Then run: nginx -t && systemctl reload nginx
# Then SSL: certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;   # ← change to your domain

    # Increase body size for product image uploads
    client_max_body_size 20M;

    # WebSocket support (Socket.io)
    location /events/ {
        proxy_pass         http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # REST API
    location / {
        proxy_pass         http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
